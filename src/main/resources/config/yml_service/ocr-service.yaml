server:
  port: 8086

spring:
  application:
    name: ocr-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

tesseract:
  datapath: ${TESSDATA_PREFIX:tessdata}
  language: vie+eng
