server:
  port: 8087

spring:
  application:
    name: ai-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

ai:
  api-key: ${AI_API_KEY:mock_key}
