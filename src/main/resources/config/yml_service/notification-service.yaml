server:
  port: 8085

spring:
  application:
    name: notification-service

  # ── Database ──────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # ── RabbitMQ ─────────────────────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

  # ── Kafka ────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.LinkedHashMap

# ── Eureka ───────────────────────────────────────────────
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

# ── Firebase ─────────────────────────────────────────────
firebase:
  enabled: true
  credentials-path: firebase-service-account.json

# ── Logging ──────────────────────────────────────────────
logging:
  level:
    com.fpm2025.notification_service: DEBUG
    org.springframework.kafka: WARN
