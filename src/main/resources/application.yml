server:
  port: 8888  # Port mặc định cho Config Server, có thể thay đổi

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/dangphuc1902/fpm-2025-config.git # URL kho Git chứa cấu hình của bạn
          # Nếu kho Git yêu cầu xác thực, hãy uncomment và điền thông tin
          # username: ${GIT_REPO_USERNAME}
          # password: ${GIT_REPO_PASSWORD}
          # search-paths: config # Nếu các file cấu hình nằm trong thư mục 'config' trong repo Git
      # enabled: true  # Bật Config Server (mặc định true, giữ để rõ ràng)
  profiles:
    active: git # Sử dụng chế độ git thay vì native
management:
  endpoints:
    web:
      exposure:
        include: health, info  # Expose endpoints để kiểm tra trạng thái

logging:
  level:
    root: INFO
    org.springframework.cloud: DEBUG  # Debug để kiểm tra log Config Server
  file:
    name: D:\WorkSpace\Project\FPM-2025\log\config-server.log  # Log file (tùy chỉnh đường dẫn)
  logback:
    rollingpolicy:
      max-file-size: 50MB  # Giới hạn kích thước log